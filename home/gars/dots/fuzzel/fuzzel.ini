# fuzzel.ini — gars-yellow 
# Place at: ~/.config/fuzzel/fuzzel.ini

[main]
font=Roboto Mono:size=13          # matches your waybar font-family / font-size
prompt="⚜️ "
terminal=alacritty
layer=overlay
exit-on-keyboard-focus-loss=yes

# --- Sizing & Layout ---
width=48                          # launcher width in characters (not pixels)
lines=16                          # max visible results
line-height=22                    # px per row; increase for more breathing room
letter-spacing=0                  # matches waybar letter-spacing: 0
horizontal-pad=26                 # left/right padding inside the window (px)
vertical-pad=12                   # top/bottom padding inside the window (px)
inner-pad=6                       # gap between input field and result list (px)

# --- Appearance ---
image-size-ratio=0.5              # shrinks app icons if you find them too big
# icon-theme=hicolor              # uncomment to force a specific icon theme

[colors]
# Format: RRGGBBAA  (AA = opacity, ff = fully opaque)

# Window chrome
background=262418ff               # crust:       #262418
border=826F11ff                   # gold-dark:   #826F11
text=F6EEC9ff                     # text:        #F6EEC9
prompt=A29C7Fff                   # overlay1:    #A29C7F  (dim, like inactive workspaces)
placeholder=5B5742ff              # surface0:    #5B5742  (more subdued than prompt)
input=F6EEC9ff                    # text:        #F6EEC9

# Selected / highlighted result
match=E3C220ff                    # brand:       #E3C220  (bright gold for matched chars)
selection=3B3724ff                # base:        #3B3724  (focused workspace bg)
selection-text=F6EEC9ff           # text:        #F6EEC9
selection-match=EFDD84ff          # light-yellow:#EFDD84  (matched chars in selected row — extra pop)

[border]
width=2                           # matches waybar border-top: 2px
radius=0                          # sharp corners to match your zero border-radius

