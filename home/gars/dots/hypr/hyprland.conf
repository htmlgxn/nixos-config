#
# ~/nixos-config/home/gars/dots/hypr/hyprland.conf
#
# Hyprland config tuned to mirror the sway setup where possible.
#

$mod = SUPER
$term = alacritty
$menu = fuzzel

monitor = ,preferred,auto,1

input {
  kb_options = caps:escape
  numlock_by_default = true
}

env = XCURSOR_THEME,Catppuccin-Mocha-Yellow-Cursors
env = XCURSOR_SIZE,26
env = XDG_DATA_DIRS,$HOME/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share:/usr/share

general {
  gaps_in = 2
  gaps_out = 2
  border_size = 2
  layout = dwindle
  col.active_border = rgb(E3C220)
  col.inactive_border = rgb(413C1E)
}

decoration {
  rounding = 0
  shadow {
    enabled = false
  }
}

animations {
  enabled = false
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  force_default_wallpaper = 0
}

workspace = 1, default:true

# ── Autostart ──────────────────────────────────────────────────────
exec-once = dbus-update-activation-environment --systemd --all
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark'
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark
exec-once = swaybg -i ~/pictures/wallpapers/jpg/mtl-16.jpg -m fill
exec-once = wlsunset -t 2500 -T 3000
exec-once = systemctl --user restart waybar
exec-once = gnome-keyring-daemon --start
exec-once = polkit-gnome-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = grass
exec-once = swayidle -w -c ~/.config/swayidle/config timeout 600 'swaylock -f -c 000000' timeout 900 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on' before-sleep 'swaylock -f -c 000000'

# ── Keybindings ────────────────────────────────────────────────────
# Apps
bind = $mod, Return, exec, $term
bind = $mod, Space, exec, $menu
bind = $mod, F2, exec, brave
bind = $mod, F3, exec, thunar

# Session
bind = $mod SHIFT, c, exec, hyprctl reload
bind = $mod SHIFT, e, exec, hyprctl dispatch exit

# Window management
bind = $mod, q, killactive
bind = $mod SHIFT, q, killactive
bind = $mod, f, fullscreen
bind = $mod SHIFT, space, togglefloating
bind = $mod SHIFT, f, togglefloating

# Focus (vim + arrows)
bind = $mod, h, movefocus, l
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, l, movefocus, r
bind = $mod, left, movefocus, l
bind = $mod, down, movefocus, d
bind = $mod, up, movefocus, u
bind = $mod, right, movefocus, r

# Move windows
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, j, movewindow, d
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, right, movewindow, r

# Workspaces
bind = $mod, bracketright, workspace, +1
bind = $mod, bracketleft, workspace, -1
bind = $mod CTRL, right, workspace, +1
bind = $mod CTRL, left, workspace, -1

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod CTRL, 1, movetoworkspace, 1
bind = $mod CTRL, 2, movetoworkspace, 2
bind = $mod CTRL, 3, movetoworkspace, 3
bind = $mod CTRL, 4, movetoworkspace, 4
bind = $mod CTRL, 5, movetoworkspace, 5
bind = $mod CTRL, 6, movetoworkspace, 6
bind = $mod CTRL, 7, movetoworkspace, 7
bind = $mod CTRL, 8, movetoworkspace, 8
bind = $mod CTRL, 9, movetoworkspace, 9
bind = $mod CTRL, 0, movetoworkspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Layout toggles
bind = $mod, b, togglesplit
bind = $mod, v, togglesplit

# Scratchpad (special workspace)
bind = $mod SHIFT, minus, movetoworkspace, special:scratchpad
bind = $mod, minus, togglespecialworkspace, scratchpad

# Resize mode
bind = $mod, r, submap, resize
submap = resize
bind = , h, resizeactive, -10 0
bind = , j, resizeactive, 0 10
bind = , k, resizeactive, 0 -10
bind = , l, resizeactive, 10 0
bind = , left, resizeactive, -20 0
bind = , down, resizeactive, 0 20
bind = , up, resizeactive, 0 -20
bind = , right, resizeactive, 20 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# Screenshots
bind = , Print, exec, grim ~/pictures/screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mod, Print, exec, grim -g "$(slurp)" ~/pictures/screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mod CTRL, Print, exec, grim -g "$(slurp)" ~/pictures/screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mod SHIFT, a, exec, grim -g "$(slurp)" - | wl-copy

# Lock
bind = $mod SHIFT, x, exec, swaylock -f -c 000000

# Audio + brightness (locked)
bindl = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindl = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindl = $mod, F11, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl = $mod, F12, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindl = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindl = $mod, F9, exec, brightnessctl set 5%-
bindl = $mod, F10, exec, brightnessctl set 5%+
